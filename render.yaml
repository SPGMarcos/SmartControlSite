services:
  - type: web
    name: smartcontrolsite
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dpg-d85ne3li849s7383pqvg-a
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        value: smartcontrolsite.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://smartcontrolsite.onrender.com,https://smartcontrol-sites-frontend.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://smartcontrolsite.onrender.com,https://smartcontrol-sites-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://smartcontrol-sites-frontend.onrender.com
      - key: FRONTEND_ORIGIN
        value: https://smartcontrol-sites-frontend.onrender.com
      - key: FRONTEND_ORIGINS
        value: https://smartcontrolsite.onrender.com,https://smartcontrol-sites-frontend.onrender.com
      - key: COOKIE_SAMESITE
        value: None
      - key: JWT_REFRESH_COOKIE_SECURE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://smartcontrolsite.onrender.com/billing?checkout=success&session_id={CHECKOUT_SESSION_ID}
      - key: STRIPE_CANCEL_URL
        value: https://smartcontrolsite.onrender.com/billing?checkout=cancel
      - key: STRIPE_PORTAL_RETURN_URL
        value: https://smartcontrolsite.onrender.com/billing

 
  - type: web
    name: smartcontrol-sites-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://smartcontrolsite.onrender.com/api
      - key: RENDER_EXTERNAL_HOSTNAME
        value: smartcontrolsite.onrender.com

databases:
  - name: dpg-d85ne3li849s7383pqvg-a
    plan: free
    databaseName: smartcontrol_sites
    user: smartcontrol
