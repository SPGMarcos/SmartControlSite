services:
  - type: web
    name: smartcontrol-sites-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dpg-d85ne3li849s7383pqvg-a
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        value: smartcontrol-sites-api.onrender.com
      - key: RENDER_EXTERNAL_HOSTNAME
        value: smartcontrolsite.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://smartcontrolsite.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://smartcontrolsite.onrender.com
      - key: FRONTEND_URL
        value: https://smartcontrolsite.onrender.com
      - key: FRONTEND_ORIGIN
        value: https://smartcontrolsite.onrender.com
      - key: COOKIE_SAMESITE
        value: None
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://spgmarcos.github.io/SmartControlSite/dashboard?checkout=success
      - key: STRIPE_CANCEL_URL
        value: https://spgmarcos.github.io/SmartControlSite/dashboard?checkout=cancel

 
  - type: web
    name: smartcontrol-sites-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smartcontrol-sites-api.onrender.com/api

databases:
  - name: smartcontrol-sites-db
    plan: free
    databaseName: smartcontrol_sites
    user: smartcontrol
  - name: dpg-d85ne3li849s7383pqvg-a
    plan: free
    databaseName: smartcontrol_sites
    user: smartcontrol
