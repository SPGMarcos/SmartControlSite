services:
  postgres:
    image: postgres:16-alpine
    container_name: smartcontrol-sites-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartcontrol_sites
      POSTGRES_USER: smartcontrol
      POSTGRES_PASSWORD: smartcontrol_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcontrol -d smartcontrol_sites"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
