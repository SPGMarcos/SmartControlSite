services:
  - type: web
    name: smartcontrolsite
    runtime: python
    rootDir: backend
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput

    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    healthCheckPath: /api/health/
    autoDeployTrigger: commit

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8

      - key: DJANGO_DEBUG
        value: "False"

      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: SMARTCONTROL_ADMIN_EMAIL
        sync: false

      - key: SMARTCONTROL_ADMIN_PASSWORD
        sync: false

      - key: SMARTCONTROL_ADMIN_FIRST_NAME
        value: Admin

      - key: SMARTCONTROL_ADMIN_LAST_NAME
        value: SmartControl

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_ANON_KEY
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: SUPABASE_JWT_SECRET
        sync: false

      - key: SUPABASE_DATABASE_URL
        sync: false

      - key: SUPABASE_PASSWORD_RESET_REDIRECT_URL
        value: https://spgmarcos.github.io/SmartControlSite/reset-password

      - key: DJANGO_ALLOWED_HOSTS
        value: smartcontrolsite.onrender.com

      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://spgmarcos.github.io,https://smartcontrolsite.onrender.com,https://smartcontrol-sites-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173

      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://spgmarcos.github.io,https://smartcontrolsite.onrender.com,https://smartcontrol-sites-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173

      - key: FRONTEND_URL
        value: https://spgmarcos.github.io/SmartControlSite

      - key: FRONTEND_ORIGIN
        value: https://spgmarcos.github.io

      - key: FRONTEND_ORIGINS
        value: https://spgmarcos.github.io,https://smartcontrolsite.onrender.com,https://smartcontrol-sites-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173

      - key: COOKIE_SAMESITE
        value: None

      - key: JWT_REFRESH_COOKIE_SECURE
        value: "True"

      - key: SECURE_SSL_REDIRECT
        value: "True"

      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      - key: STRIPE_SUCCESS_URL
        value: https://spgmarcos.github.io/SmartControlSite/billing?checkout=success&session_id={CHECKOUT_SESSION_ID}

      - key: STRIPE_CANCEL_URL
        value: https://spgmarcos.github.io/SmartControlSite/billing?checkout=cancel

      - key: STRIPE_PORTAL_RETURN_URL
        value: https://spgmarcos.github.io/SmartControlSite/billing

  - type: web
    name: smartcontrol-sites-frontend
    runtime: node
    rootDir: frontend
    plan: free

    buildCommand: |
      npm ci
      npm run build

    startCommand: npm run start

    autoDeployTrigger: commit

    envVars:
      - key: VITE_API_URL
        value: https://smartcontrol-sites-api.onrender.com/api

      - key: VITE_BASE_PATH
        value: /SmartControlSite/

      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        value: smartcontrolsite.onrender.com
