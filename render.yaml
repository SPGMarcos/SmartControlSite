services:
  - type: web
    name: smartcontrol-sites-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate --no-input
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartcontrol-sites-db
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        value: smartcontrol-sites-api.onrender.com
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://spgmarcos.github.io
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://spgmarcos.github.io
      - key: FRONTEND_URL
        value: https://spgmarcos.github.io/SmartControlSite
      - key: FRONTEND_ORIGIN
        value: https://spgmarcos.github.io
      - key: COOKIE_SAMESITE
        value: None
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://spgmarcos.github.io/SmartControlSite/dashboard?checkout=success
      - key: STRIPE_CANCEL_URL
        value: https://spgmarcos.github.io/SmartControlSite/dashboard?checkout=cancel

databases:
  - name: smartcontrol-sites-db
    plan: free
    databaseName: smartcontrol_sites
    user: smartcontrol
